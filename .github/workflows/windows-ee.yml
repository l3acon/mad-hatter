# Build and publish quay.io/matferna/mh-windows (see execution_environments/windows/build.sh).
# Requires repository secrets (Settings → Secrets and variables → Actions):
#   QUAY_IO_USERNAME, QUAY_IO_PASSWORD  — robot or account with push to quay.io/matferna/mh-windows
#   AUTOMATION_HUB_TOKEN                 — offline token used for both certified and validated Galaxy pulls
name: Build and push Windows EE (mh-windows)
on:
  workflow_dispatch:
jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_GALAXY_SERVER_CERTIFIED_TOKEN: ${{ secrets.AUTOMATION_HUB_TOKEN }}
      ANSIBLE_GALAXY_SERVER_VALIDATED_TOKEN: ${{ secrets.AUTOMATION_HUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-builder
        run: pip install --upgrade pip ansible-builder

      - name: Log in to quay.io
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.QUAY_IO_USERNAME }}" || -z "${{ secrets.QUAY_IO_PASSWORD }}" ]]; then
            echo "Missing QUAY_IO_USERNAME or QUAY_IO_PASSWORD repository secrets."
            exit 1
          fi
          echo "${{ secrets.QUAY_IO_PASSWORD }}" | podman login quay.io \
            -u "${{ secrets.QUAY_IO_USERNAME }}" --password-stdin

      - name: Build and push mh-windows
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.AUTOMATION_HUB_TOKEN }}" ]]; then
            echo "Missing AUTOMATION_HUB_TOKEN repository secret."
            exit 1
          fi
          cd execution_environments/windows
          bash ./build.sh
