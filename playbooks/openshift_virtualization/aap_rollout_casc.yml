---
# Apply roles/openshift_virtualization_aap CasC to an existing controller (job templates, project, EE, credentials, inventory).
# Requires: oc logged into the cluster; route and admin secret match aap_operator defaults (namespace aap, route/secret prefix aap).
# Optional: -e aap_hostname= -e aap_password= -e openshift_api_url= -e openshift_bearer_token= to skip discovery.
# Optional: -e openshift_virt_aap_project_scm_branch=may13-updates if the controller should track a feature branch.
- name: Roll out OpenShift Virtualization AAP CasC to controller
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_username: admin
    aap_casc_aap_namespace: "{{ aap_operator_project | default('aap') }}"
    aap_casc_route_name: "{{ aap_operator_app_name | default('aap') }}"
  tasks:
    - name: Discover AAP and OpenShift API from oc context
      ansible.builtin.include_tasks: tasks/discover_aap_from_oc.yml

    - name: Apply OpenShift Virtualization AAP CasC
      ansible.builtin.include_role:
        name: openshift_virtualization_aap
