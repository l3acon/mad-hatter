---
# Apply roles/openshift_virtualization_aap CasC to an existing controller (job templates, project, EE, credentials, inventory).
# Requires: oc logged into the cluster. Controller API uses route/secret **aap-controller** (not the gateway **aap** route).
# Optional: -e aap_hostname= -e aap_password= -e openshift_api_url= -e openshift_bearer_token= to skip discovery.
# Optional: -e openshift_virt_aap_project_scm_branch=main to pin the controller project branch (otherwise the
# checkout's current git branch is used so CasC matches the branch you are developing on).
- name: Roll out OpenShift Virtualization AAP CasC to controller
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_username: admin
    aap_casc_aap_namespace: "{{ aap_operator_project | default('aap') }}"
    aap_casc_route_name: "{{ aap_operator_app_name | default('aap') }}"
    aap_casc_controller_route_name: aap-controller
    aap_casc_admin_secret_name: aap-admin-password
    _mad_hatter_repo_root: "{{ playbook_dir | dirname | dirname }}"
  tasks:
    - name: Default controller project SCM branch to current git branch when unset
      when: openshift_virt_aap_project_scm_branch is not defined
      block:
        - name: Resolve current git branch for mad-hatter checkout
          ansible.builtin.command:
            cmd: git rev-parse --abbrev-ref HEAD
            chdir: "{{ _mad_hatter_repo_root }}"
          changed_when: false
          register: ocpv_aap_git_branch

        - name: Set openshift_virt_aap_project_scm_branch from git
          ansible.builtin.set_fact:
            openshift_virt_aap_project_scm_branch: "{{ ocpv_aap_git_branch.stdout | trim }}"

    - name: Discover AAP and OpenShift API from oc context
      ansible.builtin.include_tasks: tasks/discover_aap_from_oc.yml

    - name: Apply OpenShift Virtualization AAP CasC
      ansible.builtin.include_role:
        name: openshift_virtualization_aap
