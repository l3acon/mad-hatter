---
# Expect play vars: aap_username, aap_casc_aap_namespace, aap_casc_route_name
# Sets: openshift_api_url, openshift_bearer_token, aap_hostname, aap_password (unless already defined)
#
# AAP 2.7 uses the gateway route ("aap") as the sole entry point; the controller
# route ("aap-controller") no longer accepts direct API calls. We try the gateway
# route first and fall back to the controller route for pre-2.7 clusters.
- name: Discover OpenShift API URL from current context
  when: openshift_api_url is not defined
  ansible.builtin.command: oc whoami --show-server=true
  changed_when: false
  register: aap_rollout_oc_server

- name: Set openshift_api_url from oc
  when: openshift_api_url is not defined
  ansible.builtin.set_fact:
    openshift_api_url: "{{ aap_rollout_oc_server.stdout | trim }}"

- name: Discover bearer token from current oc session
  when: openshift_bearer_token is not defined
  ansible.builtin.command: oc whoami --show-token
  changed_when: false
  register: aap_rollout_oc_token

- name: Set openshift_bearer_token from oc
  when: openshift_bearer_token is not defined
  ansible.builtin.set_fact:
    openshift_bearer_token: "{{ aap_rollout_oc_token.stdout | trim }}"

- name: Discover AAP hostname from route
  when: aap_hostname is not defined
  block:
    - name: Try gateway route (AAP 2.5+)
      ansible.builtin.command: >-
        oc get route {{ aap_casc_route_name | default('aap') }} -n {{ aap_casc_aap_namespace }}
        -o jsonpath={.spec.host}
      changed_when: false
      register: aap_rollout_gw_route
      ignore_errors: true

    - name: Fall back to controller route (pre-2.5)
      ansible.builtin.command: >-
        oc get route {{ aap_casc_controller_route_name | default('aap-controller') }} -n {{ aap_casc_aap_namespace }}
        -o jsonpath={.spec.host}
      changed_when: false
      register: aap_rollout_ctrl_route
      when: aap_rollout_gw_route is failed

    - name: Set aap_hostname from route
      ansible.builtin.set_fact:
        aap_hostname: >-
          https://{{
            (aap_rollout_gw_route.stdout | trim)
            if (aap_rollout_gw_route is not failed and aap_rollout_gw_route.stdout | trim | length > 0)
            else (aap_rollout_ctrl_route.stdout | trim)
          }}

- name: Discover admin password from cluster secret
  when: aap_password is not defined
  block:
    - name: Try gateway admin secret (AAP 2.5+)
      ansible.builtin.command: >-
        oc get secret {{ aap_casc_admin_secret_name | default('aap-admin-password') }}
        -n {{ aap_casc_aap_namespace }} -o jsonpath={.data.password}
      changed_when: false
      register: aap_rollout_gw_secret_b64
      no_log: true
      ignore_errors: true

    - name: Fall back to controller admin secret (pre-2.5)
      ansible.builtin.command: >-
        oc get secret aap-controller-admin-password
        -n {{ aap_casc_aap_namespace }} -o jsonpath={.data.password}
      changed_when: false
      register: aap_rollout_ctrl_secret_b64
      no_log: true
      when: aap_rollout_gw_secret_b64 is failed

    - name: Set aap_password from decoded secret
      ansible.builtin.set_fact:
        aap_password: >-
          {{
            (aap_rollout_gw_secret_b64.stdout | b64decode)
            if (aap_rollout_gw_secret_b64 is not failed and aap_rollout_gw_secret_b64.stdout | length > 0)
            else (aap_rollout_ctrl_secret_b64.stdout | b64decode)
          }}
      no_log: true
