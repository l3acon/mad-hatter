---
# Update the controller "OpenShift Credential" bearer token + API host from the current `oc` session.
# Use when job templates return Kubernetes 401 (expired token or credential drift).
#
# Requires: `oc login` to the target cluster (same API the credential should use).
# Optional: -e aap_openshift_credential_id=6 when your controller uses a different id.
#
# Example:
#   oc login --token=... --server=https://api...
#   ansible-playbook playbooks/openshift_virtualization/aap_sync_openshift_credential_from_oc.yml
#
- name: Sync controller OpenShift API credential from oc session
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_username: admin
    aap_casc_aap_namespace: "{{ aap_operator_project | default('aap') }}"
    aap_casc_controller_route_name: aap-controller
    aap_casc_admin_secret_name: aap-controller-admin-password
  tasks:
    - name: Discover controller API password and OpenShift API from oc
      ansible.builtin.include_tasks: tasks/discover_aap_from_oc.yml

    - name: Assert oc session produced a bearer token
      ansible.builtin.assert:
        that:
          - openshift_bearer_token is defined
          - openshift_bearer_token | length > 40
        fail_msg: >-
          No usable OpenShift token from `oc`. Run `oc login` to the cluster, then re-run this playbook.

    - name: Resolve OpenShift credential id on controller when unset
      when: aap_openshift_credential_id is not defined
      block:
        - name: Search credentials by name
          ansible.builtin.uri:
            url: "{{ aap_hostname }}/api/v2/credentials/?search=OpenShift%20Credential"
            method: GET
            url_username: "{{ aap_username }}"
            url_password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: false
            return_content: true
            status_code: [200]
          register: aap_cred_search
          no_log: true

        - name: Pick OpenShift Credential id
          ansible.builtin.set_fact:
            aap_openshift_credential_id: "{{ (aap_cred_search.json.results | selectattr('name', 'equalto', 'OpenShift Credential') | map(attribute='id') | first) }}"
          when: (aap_cred_search.json.results | selectattr('name', 'equalto', 'OpenShift Credential') | list | length) > 0

        - name: Fail when OpenShift Credential not found
          ansible.builtin.fail:
            msg: >-
              Could not find a credential named "OpenShift Credential" in organization Default.
              Pass -e aap_openshift_credential_id=<id> from the controller UI.
          when: aap_openshift_credential_id is not defined

    - name: Fetch credential document for PUT
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/v2/credentials/{{ aap_openshift_credential_id }}/"
        method: GET
        url_username: "{{ aap_username }}"
        url_password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
        status_code: [200]
      register: aap_cred_get
      no_log: true

    - name: PUT OpenShift Credential with current oc token and API host
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/v2/credentials/{{ aap_openshift_credential_id }}/"
        method: PUT
        url_username: "{{ aap_username }}"
        url_password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "{{ aap_cred_get.json.name }}"
          description: "{{ aap_cred_get.json.description | default('') }}"
          organization: "{{ aap_cred_get.json.organization }}"
          credential_type: "{{ aap_cred_get.json.credential_type }}"
          inputs:
            host: "{{ openshift_api_url }}"
            bearer_token: "{{ openshift_bearer_token }}"
        status_code: [200]
      no_log: true

    - name: Report credential updated
      ansible.builtin.debug:
        msg: >-
          Updated controller credential id {{ aap_openshift_credential_id }} ({{ aap_cred_get.json.name }})
          with host {{ openshift_api_url }} and a fresh bearer token from `oc`.
