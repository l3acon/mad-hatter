---
# Wait until the VirtualMachineInstance reports a guest IP on an interface.
# Run this after Create VM and before the OpenShift Virtualization inventory sync so the dynamic inventory
# can populate ansible_host (syncing too early often races: VM exists but no ipAddress yet).
- name: Wait for VMI guest network (inventory-ready)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Validate required job variables
      ansible.builtin.assert:
        that:
          - ocpv_vm_name is defined and ocpv_vm_name | length > 0
          - ocpv_vm_namespace is defined and ocpv_vm_namespace | length > 0
        fail_msg: >-
          Set ocpv_vm_name and ocpv_vm_namespace (workflow passes these from the survey).

    - name: Wait until VMI reports a guest IP
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        name: "{{ ocpv_vm_name }}"
        namespace: "{{ ocpv_vm_namespace }}"
      register: ocpv_vmi
      until: >-
        ocpv_vmi.resources | length > 0
        and (
          ocpv_vmi.resources[0].status.interfaces | default([])
          | selectattr('ipAddress', 'defined')
          | map(attribute='ipAddress')
          | list
          | length > 0
        )
      retries: 40
      delay: 15
