---
# Post-provision: install a package on a Fedora guest discovered by the Controller
# "OpenShift Virtualization" inventory source (plugin: redhat.openshift_virtualization).
#
# Expects extra vars: ocpv_vm_namespace, ocpv_vm_name, ocpv_post_package_name (workflow survey or job extra_vars).
# Host name in that inventory is {namespace}-{vm_name} (see Red Hat OpenShift Virtualization / AAP inventory docs).
#
# Job template must use the KubeVirt dynamic inventory and a Machine credential whose key matches the VM's
# ssh_authorized_keys (e.g. survey ocpv_ssh_public_key on Create VM).
- name: Install requested package on guest
  hosts: "{{ ocpv_vm_namespace | trim }}-{{ ocpv_vm_name | trim }}"
  gather_facts: false
  pre_tasks:
    - name: Validate required job variables
      ansible.builtin.assert:
        that:
          - ocpv_vm_name is defined and ocpv_vm_name | length > 0
          - ocpv_vm_namespace is defined and ocpv_vm_namespace | length > 0
          - ocpv_post_package_name is defined and ocpv_post_package_name | length > 0
        fail_msg: >-
          Set ocpv_vm_name, ocpv_vm_namespace, and ocpv_post_package_name (workflow survey or extra vars).

    - name: Wait for SSH (VM can appear in inventory before sshd accepts connections)
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 600

  tasks:
    - name: Install package with dnf
      ansible.builtin.dnf:
        name: "{{ ocpv_post_package_name }}"
        state: present
      become: true
