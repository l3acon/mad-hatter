---
# Launch "OpenShift Virtualization | Create VM" on controller and assert a VirtualMachine exists in the cluster.
# Requires: oc logged in (same cluster as OpenShift Credential on the job template); CasC already applied (aap_rollout_casc.yml).
# Optional: -e smoke_vm_namespace=my-ns -e smoke_vm_name=my-vm (defaults generate a unique name in namespace ocpv-aap-smoke).
- name: Validate Create VM job template via controller
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_username: admin
    aap_casc_aap_namespace: "{{ aap_operator_project | default('aap') }}"
    aap_casc_route_name: "{{ aap_operator_app_name | default('aap') }}"
    smoke_vm_namespace: ocpv-aap-smoke
  tasks:
    - name: Discover AAP and OpenShift API from oc context
      ansible.builtin.include_tasks: tasks/discover_aap_from_oc.yml

    - name: Timestamp for default VM name
      ansible.builtin.command: date +%s
      changed_when: false
      register: ocpv_smoke_epoch

    - name: Default smoke VM name
      ansible.builtin.set_fact:
        smoke_vm_name: "{{ smoke_vm_name | default('mh-smoke-' ~ ocpv_smoke_epoch.stdout) }}"

    - name: Ensure smoke namespace exists
      ansible.builtin.command: oc create namespace "{{ smoke_vm_namespace }}"
      register: ocpv_smoke_create_ns
      changed_when: ocpv_smoke_create_ns.rc == 0
      failed_when: >
        ocpv_smoke_create_ns.rc != 0
        and ('AlreadyExists' not in (ocpv_smoke_create_ns.stderr | default('')))
        and ('already exists' not in (ocpv_smoke_create_ns.stderr | default('')))

    - name: Launch Create VM job template on controller
      ansible.controller.job_launch:
        job_template: "OpenShift Virtualization | Create VM"
        organization: Default
        controller_host: "{{ aap_hostname }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ aap_password }}"
        validate_certs: false
        extra_vars:
          ocpv_vm_name: "{{ smoke_vm_name }}"
          ocpv_vm_namespace: "{{ smoke_vm_namespace }}"
        wait: true
        timeout: 900
      register: ocpv_smoke_job

    - name: Assert VirtualMachine exists in cluster
      ansible.builtin.command: >-
        oc get vm {{ smoke_vm_name }} -n {{ smoke_vm_namespace }}
        -o jsonpath={.metadata.name}
      changed_when: false
      register: ocpv_smoke_get_vm
      failed_when: ocpv_smoke_get_vm.stdout | trim | length == 0

    - name: Report smoke test result
      ansible.builtin.debug:
        msg:
          - "Controller job id: {{ ocpv_smoke_job.id | default('?') }} status: {{ ocpv_smoke_job.status | default('?') }}"
          - "VirtualMachine: {{ smoke_vm_namespace }}/{{ ocpv_smoke_get_vm.stdout | trim }}"
