---
- name: Deploy AAP with OpenShift Virtualization product demos on ARO
  hosts: localhost
  vars:
    aap_operator_disable_lightspeed: false
    aro_creds_file_path: "{{ playbook_dir }}/../aro.creds.yml"
    aro_creds_require_pub_key: true
  tasks:
    - name: Slurp ARO credentials
      ansible.builtin.include_role:
        name: aro_creds

    - name: Slurp user credentials
      ansible.builtin.include_role:
        name: user_creds

    - name: Get OC login status
      ansible.builtin.command: "oc whoami --show-server=true" # noqa: no-changed-when
      register: oc_whoami
      ignore_errors: true

    - name: Login to ARO cluster if needed
      when:
        - (oc_whoami is failed) or (openshift_console_url not in oc_whoami.stdout)
      block:
        - name: Login to OCP Cluster with credentials
          ansible.builtin.command: >-
            oc login --username=kubeadmin
            --password={{ openshift_kubeadmin_password }}
            {{ openshift_api_url }}
          register: oc_login
          changed_when: "'Login successful' in oc_login.stdout"

    - name: Deploy AAP Operator
      ansible.builtin.include_role:
        name: 'aap_operator'
        tasks_from: workload
      vars:
        aap_operator_controller_admin_password: "{{ aap_admin_password }}"
        aap_operator_inject_manifest: true
        aap_operator_inject_manifest_path: "{{ aap_manifest_path }}"

    - name: Get OCP bearer token
      ansible.builtin.command: "oc whoami --show-token" # noqa: no-changed-when
      register: oc_token_result

    - name: Set OCP bearer token
      ansible.builtin.set_fact:
        openshift_bearer_token: "{{ oc_token_result.stdout }}"

    - name: Obtain gateway OAuth token for CasC modules
      ansible.platform.token:
        description: "CasC dispatch token"
        scope: "write"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: false
      register: _casc_token_result

    - name: Set controller OAuth token for ansible.controller modules
      ansible.builtin.set_fact:
        controller_oauthtoken: "{{ _casc_token_result.ansible_facts.aap_token.token }}"

    - name: OpenShift Virtualization AAP configuration as code # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: openshift_virtualization_aap
      vars:
        openshift_virt_aap_cost_opt_schedule_enabled: false
        openshift_virt_aap_extra_controller_credentials:
          - name: Demo Credential
            credential_type: Machine
            update_secrets: true
            inputs:
              username: "admin"
              password: "{{ aap_machine_cred_password }}"
              ssh_key_data: "{{ aap_machine_cred_priv_key }}"

          - name: Azure
            credential_type: Microsoft Azure Resource Manager
            organization: Default
            inputs:
              subscription: "{{ azure_subscription }}"
              username: "{{ azure_resourcegroup }}"
              password: "{{ azure_password }}"
              secret: "{{ azure_password }}"
              tenant: "{{ azure_tenant }}"
              client: "{{ azure_client_id }}"

    - name: Display Access info
      ansible.builtin.debug:
        msg:
          - "AAP URL: {{ aap_controller_web_url }}"
          - "AAP Admin Login: {{ aap_controller_admin_user }}"
          - "AAP Admin Password: {{ aap_operator_controller_admin_password }}"
