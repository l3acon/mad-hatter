---
- name: Assert required variables and credentials
  ansible.builtin.assert:
    that:
      - aap_hostname is defined
      - aap_username is defined
      - aap_password is defined
      - openshift_api_url is defined
      - openshift_bearer_token is defined
      - openshift_bearer_token | length > 0

- name: Build merged controller credentials for dispatch # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    controller_credentials: >-
      {{
        openshift_virt_aap_controller_credentials
        + (openshift_virt_aap_extra_controller_credentials | default([]))
        + openshift_virt_aap_openshift_credential
      }}

# controller_inventories role passes `variables` through a regex_replace chain that breaks omit/empty dict on Ansible 2.20+.
- name: Ensure controller inventory exists
  ansible.controller.inventory:
    name: "{{ openshift_virt_aap_inventory_name }}"
    organization: Default
    state: present
    controller_host: "{{ aap_hostname }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: "{{ openshift_virt_aap_verify_ssl }}"

# infra.aap_configuration subroles ship empty defaults (e.g. controller_projects: [], aap_organizations: [])
# that override this role's defaults while dispatch runs. Host facts survive nested include_role.
# Skip controller_inventories in dispatch (inventory ensured by the task above).
- name: Publish CasC lists for dispatch (nested role defaults would otherwise mask ours)
  ansible.builtin.set_fact:
    aap_organizations: "{{ aap_organizations }}"
    controller_execution_environments: "{{ controller_execution_environments }}"
    controller_projects: "{{ controller_projects }}"
    controller_inventories: []
    controller_hosts: "{{ controller_hosts }}"
    controller_workflows: "{{ controller_workflows }}"

- name: Apply Automation Controller configuration (OpenShift Virtualization CasC)
  ansible.builtin.include_role:
    name: infra.aap_configuration.dispatch
