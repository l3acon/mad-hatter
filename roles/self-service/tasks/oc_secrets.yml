---
- name: Save OAuth credentials before conditional re-create
  ansible.builtin.set_fact:
    _oauth_client_id: "{{ app_result.client_id }}"
    _oauth_client_secret: "{{ app_result.client_secret }}"

- name: Recreate OAuth2 application if secret is encrypted
  when: _oauth_client_secret == "$encrypted$"
  block:
    - name: Delete OAuth2 application in AAP
      ansible.platform.application:
        name: "{{ aap_oauth_client_name }}"
        description: "Self Service application"
        organization: "{{ aap_organization }}"
        state: absent
        aap_hostname: "{{ controller_host }}"
        aap_username: "{{ controller_username }}"
        aap_password: "{{ controller_password }}"
        aap_validate_certs: "{{ controller_verify_ssl }}"

    - name: Create OAuth2 application in AAP
      ansible.platform.application:
        name: "{{ aap_oauth_client_name }}"
        description: "Self Service application"
        organization: "{{ aap_organization }}"
        state: present
        authorization_grant_type: authorization-code
        client_type: confidential
        redirect_uris:
          - "{{ rhaap_redirect_url | default('https://placeholder.com') }}"
        app_url: "{{ rhaap_app_url | default('https://placeholder.com') }}"
        aap_hostname: "{{ controller_host }}"
        aap_username: "{{ controller_username }}"
        aap_password: "{{ controller_password }}"
        aap_validate_certs: "{{ controller_verify_ssl }}"
      register: _app_recreated

    - name: Update OAuth credentials from recreated app
      ansible.builtin.set_fact:
        _oauth_client_id: "{{ _app_recreated.client_id }}"
        _oauth_client_secret: "{{ _app_recreated.client_secret }}"

- name: "Create secret: secrets-rhaap-portal"
  redhat.openshift.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: secrets-rhaap-portal
        namespace: "{{ openshift_namespace }}"
      type: Opaque
      data:
        aap-host-url: "{{ controller_host | b64encode }}"
        aap-token: "{{ aap_token_result.ansible_facts.aap_token.token | b64encode }}"
        oauth-client-id: "{{ _oauth_client_id | b64encode }}"
        oauth-client-secret: "{{ _oauth_client_secret | b64encode }}"

- name: Normalize tokens
  set_fact:
    _gitlab_token: "{{ gitlab_token | default('', true) }}"
    _github_token: "{{ github_token | default('', true) }}"

- name: Build secrets-scm data
  set_fact:
    scm_secret_data: >-
      {{
        dict(
          [('gitlab-token', _gitlab_token)] if _gitlab_token != '' else []
          +
          [('github-token', _github_token)] if _github_token != '' else []
        )
      }}


- name: "Create secret: secrets-scm"
  redhat.openshift.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: secrets-scm
        namespace: "{{ openshift_namespace }}"
      type: Opaque
      stringData: "{{ scm_secret_data }}"

- name: Create registry auth secret for OCI plugin delivery
  when: ssp_plugin_mode | default('oci') == 'oci'
  block:
    - name: Get cluster pull secret
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: pull-secret
        namespace: openshift-config
      register: _cluster_pull_secret

    - name: Extract registry.redhat.io auth from cluster pull secret
      ansible.builtin.set_fact:
        _registry_auth: >-
          {{ (_cluster_pull_secret.resources[0].data['.dockerconfigjson'] | b64decode | from_json).auths['registry.redhat.io'] | default({}) }}

    - name: "Create secret: {{ helm_release_name }}-dynamic-plugins-registry-auth"
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ helm_release_name }}-dynamic-plugins-registry-auth"
            namespace: "{{ openshift_namespace }}"
          type: Opaque
          data:
            auth.json: "{{ {'auths': {'registry.redhat.io': _registry_auth}} | to_json | b64encode }}"
      when: _registry_auth | length > 0
