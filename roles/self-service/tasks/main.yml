---
- name: Preflight checks
  import_tasks: preflight.yml
  tags: [preflight]

- name: Create OAuth2 application in AAP
  import_tasks: oauth.yml
  tags: [create_oauth]

- name: Create AAP token
  import_tasks: create_token.yml
  tags: [create_token]

- name: Create OpenShift namespace
  import_tasks: namespace.yml
  tags: [create_namespace]

- name: Create OpenShift secrets
  import_tasks: oc_secrets.yml
  tags:
    - create_secrets
    - create_rhaap_secret
    - create_scm_secret

- name: Apply RBAC policies ConfigMap
  import_tasks: rbac_configmap.yml
  tags: [rbac]

- name: Build plugin registry (tarball mode only)
  ansible.builtin.include_tasks: plugins.yml
  when: ssp_plugin_mode | default('oci') != 'oci'
  tags: [build_plugin]

- name: Deploy plugin registry app (tarball mode only)
  ansible.builtin.include_tasks: plugin_deploy.yml
  when: ssp_plugin_mode | default('oci') != 'oci'
  tags: [deploy_plugin]

- name: Generate Helm values with plugin integrity
  import_tasks: helm_values.yml
  tags:
    - helm
    - helm_plugins
    - generate_helm_values

- name: Update AAP OAuth2 application with RHAAP route
  import_tasks: update_aap_oauth.yml
  tags: [update_oauth]
